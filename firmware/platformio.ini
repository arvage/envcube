; ============================================================
;  EnvCube — PlatformIO project configuration
;  MCU: ESP32-C6-DevKitC-1
;  Framework: Arduino (espressif32 @ 6.10.0 — ESP-IDF 5.4)
; ============================================================

[platformio]
default_envs = esp32c6
description = EnvCube environmental monitor firmware

; ── Shared settings ─────────────────────────────────────────
[env]
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; ── Main build target ───────────────────────────────────────
[env:esp32c6]
platform   = espressif32 @ 6.10.0
board      = esp32-c6-devkitc-1
framework  = arduino

; ESP32-C6 USB CDC on boot (needed for serial monitor over USB)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    ; Feature flags — comment out to disable modules
    -DENVCUBE_ENABLE_ESPNOW=1
    -DENVCUBE_ENABLE_MQTT=1
    -DENVCUBE_ENABLE_OTA=1
    -DENVCUBE_ENABLE_WEATHER=1

; Custom OTA partition table (dual bank + NVS)
board_build.partitions = partitions.csv

; Upload & monitor
upload_speed   = 921600
upload_protocol = esptool

; ── Libraries ───────────────────────────────────────────────
lib_deps =
    ; WiFi + provisioning
    tzapu/WiFiManager @ ^2.0.17
    ; OLED display
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    ; SHT40 temperature + humidity
    adafruit/Adafruit SHT4x Library @ ^1.0.4
    ; SCD41 CO2
    Sensirion/arduino-i2c-scd4x @ ^0.4.0
    ; SGP41 VOC + NOx
    Sensirion/arduino-i2c-sgp41 @ ^0.1.0
    ; BMP280 pressure
    adafruit/Adafruit BMP280 Library @ ^2.6.8
    ; VEML7700 ambient light
    adafruit/Adafruit VEML7700 Library @ ^2.1.2
    ; PMSA003I particulate
    adafruit/Adafruit PM25 AQI Sensor @ ^1.0.6
    ; WS2812B RGB LED
    fastled/FastLED @ ^3.6.0
    ; DFPlayer Mini speaker
    DFRobot/DFRobotDFPlayerMini @ ^1.0.6
    ; MQTT
    knolleary/PubSubClient @ ^2.8
    ; ArduinoJSON (MQTT payloads, weather)
    bblanchon/ArduinoJson @ ^7.1.0
    ; NVS preferences wrapper
    ; (built into ESP32 Arduino core — no external lib needed)

; ── OTA build target (same config, OTA upload) ──────────────
[env:esp32c6-ota]
extends            = env:esp32c6
upload_protocol    = espota
upload_port        = envcube.local   ; mDNS name of target cube
upload_flags       = --port=3232

; ── Unit test target ────────────────────────────────────────
[env:native]
platform = native
lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0
build_flags = -std=c++17
