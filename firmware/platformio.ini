; ============================================================
;  EnvCube — PlatformIO project configuration
;  MCU: ESP32-C6-DevKitC-1
;  Framework: Arduino via pioarduino (Arduino ESP32 Core 3.x)
;
;  WHY pioarduino?
;  The official espressif32 platform never added Arduino
;  framework support for ESP32-C6. pioarduino is the
;  community-maintained fork that supports it.
;  Ref: https://github.com/pioarduino/platform-espressif32
; ============================================================

[platformio]
default_envs = esp32c6
description = EnvCube environmental monitor firmware

[env]
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; ── Main build target ───────────────────────────────────────
[env:esp32c6]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-c6-devkitc-1
framework = arduino

; PlatformIO Arduino convention: source in src/, includes from src/
src_dir   = src
build_src_filter = +<*>
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DENVCUBE_ENABLE_ESPNOW=1
    -DENVCUBE_ENABLE_MQTT=1
    -DENVCUBE_ENABLE_OTA=1
    -DENVCUBE_ENABLE_WEATHER=1
    -I src

board_build.partitions = partitions.csv
upload_speed    = 921600
upload_protocol = esptool

lib_deps =
    ; WiFi provisioning
    tzapu/WiFiManager @ ^2.0.17
    ; OLED display
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    ; SHT40 temperature + humidity
    adafruit/Adafruit SHT4x Library @ ^1.0.4
    ; SCD41 CO2
    sensirion/Sensirion I2C SCD4x @ ^0.4.0
    ; SGP41 VOC + NOx — not in registry, install from GitHub
    https://github.com/Sensirion/arduino-i2c-sgp41
    ; Gas Index Algorithm (VOC + NOx processing)
    https://github.com/Sensirion/arduino-gas-index-algorithm
    ; Sensirion Core (required by SCD4x + SGP41)
    sensirion/Sensirion Core @ ^0.6.0
    ; BMP280 pressure
    adafruit/Adafruit BMP280 Library @ ^2.6.8
    ; VEML7700 ambient light
    adafruit/Adafruit VEML7700 Library @ ^2.1.2
    ; PMSA003I particulate
    adafruit/Adafruit PM25 AQI Sensor @ ^1.0.6
    ; WS2812B RGB LED
    fastled/FastLED @ ^3.6.0
    ; DFPlayer Mini speaker
    DFRobot/DFRobotDFPlayerMini @ ^1.0.6
    ; MQTT
    knolleary/PubSubClient @ ^2.8
    ; ArduinoJSON
    bblanchon/ArduinoJson @ ^7.1.0

; ── OTA build target ────────────────────────────────────────
[env:esp32c6-ota]
extends         = env:esp32c6
upload_protocol = espota
upload_port     = 172.16.172.159
upload_flags    =
    --port=3232
    --auth=envcube-ota
